<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rh for Design | Luxury Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
        }
        body { background-color: #f4f4f4; font-family: 'Cairo', sans-serif; margin: 0; }
        
        /* البانر الأسود مع تأثير الإضاءة المتحركة */
        .luxury-hero {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            padding: 120px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid var(--gold);
        }

        /* حركة النص عند الدخول */
        .brand-3d {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(3rem, 8vw, 5rem);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            animation: fadeInDown 1.5s ease-out;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .gold-text { color: var(--gold); }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-top: 15px;
            animation: fadeInUp 2s ease-out;
        }

        /* الكروت بظلال ذهبية خفيفة عند التحويم */
        .card {
            border: none;
            border-radius: 0; /* استايل مودرن حاد الزوايا قليلاً للفخامة */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: 0.5s;
            height: 100%;
            background: #fff;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2);
        }

        .btn-visit { 
            background: #000; 
            color: var(--gold); 
            border: 1px solid var(--gold);
            border-radius: 0;
            transition: 0.3s;
            font-weight: bold;
        }
        .btn-visit:hover { background: var(--gold); color: #000; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .whatsapp-btn { position: fixed; bottom: 30px; right: 30px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="luxury-hero">
    <h1 class="brand-3d">Rh <span class="gold-text">for</span> Design</h1>
    <p class="subtitle">Where Creativity Meets Luxury</p>
</div>

<div class="container my-5">
    <div class="row g-4">
        
        <script>
            const myStores = [
                {n: "apexluxcare", d: "متجر معجون اسنان صحى", l: "https://apexluxcare.com/"},
                {n: "twinaro", d: "متجر ملابس", l: "https://twinaro.com/"},
                {n: "glowyshop", d: "متجر حقائب", l: "https://glowyshop.myeasyorders.com/#"},
                {n: "livoraa", d: "متجر متعدد", l: "https://livoraa.myeasyorders.com/"},
                {n: "forsety", d: "متجر متعدد", l: "https://forsety.myeasyorders.com/"},
                {n: "d-nine", d: "متجر احذية رياضية", l: "https://d-nine.myeasyorders.com/"},
                {n: "gomaa-store", d: "متجر متعدد", l: "https://gomaa-store.myeasyorders.com/"},
                {n: "drrei-agri", d: "متجر منتجات زراعية", l: "https://www.drrei-agri.com/"}
            ];

            myStores.forEach(s => {
                document.write(`
                    <div class="col-md-4">
                        <div class="card text-center">
                            <img src="https://via.placeholder.com/400x250/1a1a1a/d4af37?text=${s.n}" class="card-img-top">
                            <div class="card-body">
                                <h5 class="fw-bold">${s.n}</h5>
                                <p class="text-muted small">${s.d}</p>
                                <a href="${s.l}" target="_blank" class="btn btn-visit w-100">VISIT STORE</a>
                            </div>
                        </div>
                    </div>
                `);
            });
        </script>

    </div>
</div>

<a href="https://wa.me/201005319339" class="whatsapp-btn" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
</a>

</body>
</html>
