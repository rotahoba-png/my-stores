<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rh for Design | Luxury Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #000000; }
        body { background-color: #fcfcfc; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* بانر انسيابي فاخر */
        .luxury-hero {
            background: #000;
            background-image: radial-gradient(circle at top right, #1a1a1a, #000);
            padding: 150px 0;
            text-align: center;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            position: relative;
        }

        /* دخول شيك وانسيابي للعنوان */
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: calc(3rem + 4vw);
            color: #fff;
            margin: 0;
            letter-spacing: -1px;
            opacity: 0;
            filter: blur(10px);
            animation: elegantReveal 1.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .gold-word { color: var(--gold); font-style: italic; font-weight: 300; }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            color: rgba(255,255,255,0.6);
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 2.5s ease-out 0.5s forwards;
        }

        /* حركة المربعات (الكروت) */
        .card {
            border: none;
            border-radius: 0px; /* زوايا حادة للفخامة */
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            height: 100%;
            background: #fff;
            overflow: hidden;
        }
        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
        }
        .card-img-top { height: 240px; object-fit: cover; background: #111; transition: 0.6s; }
        .card:hover .card-img-top { transform: scale(1.05); }
        
        .btn-gold {
            background: transparent;
            color: var(--dark);
            border: 1px solid var(--dark);
            border-radius: 0;
            padding: 10px 20px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 600;
            transition: 0.4s;
            text-decoration: none;
        }
        .btn-gold:hover { background: var(--dark); color: #fff; }

        /* الأنيميشن الاحترافي */
        @keyframes elegantReveal {
            0% { opacity: 0; filter: blur(15px); transform: translateY(20px); }
            100% { opacity: 1; filter: blur(0); transform: translateY(0); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .whatsapp-btn { position: fixed; bottom: 30px; right: 30px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="luxury-hero">
    <h1 class="brand-name">Rh <span class="gold-word">for</span> Design</h1>
    <p class="subtitle">Bespoke Digital Experiences</p>
</div>

<div class="container my-5">
    <div class="row g-5">
        
        <script>
            const stores = [
                {n: "apexluxcare", d: "متجر معجون اسنان صحى", l: "https://apexluxcare.com/"},
                {n: "twinaro", d: "متجر ملابس", l: "https://twinaro.com/"},
                {n: "glowyshop", d: "متجر حقائب", l: "https://glowyshop.myeasyorders.com/#"},
                {n: "livoraa", d: "متجر متعدد", l: "https://livoraa.myeasyorders.com/"},
                {n: "forsety", d: "متجر متعدد", l: "https://forsety.myeasyorders.com/"},
                {n: "d-nine", d: "متجر احذية رياضية", l: "https://d-nine.myeasyorders.com/"},
                {n: "gomaa-store", d: "متجر متعدد", l: "https://gomaa-store.myeasyorders.com/"},
                {n: "drrei-agri", d: "متجر منتجات زراعية", l: "https://www.drrei-agri.com/"}
            ];

            stores.forEach(s => {
                document.write(`
                    <div class="col-md-4">
                        <div class="card text-center">
                            <img src="https://via.placeholder.com/400x300/111/c5a059?text=${s.n}" class="card-img-top">
                            <div class="card-body py-4">
                                <h6 class="fw-bold" style="letter-spacing:1px">${s.n.toUpperCase()}</h6>
                                <p class="text-muted small mb-4">${s.d}</p>
                                <a href="${s.l}" target="_blank" class="btn btn-gold">VIEW PROJECT</a>
                            </div>
                        </div>
                    </div>
                `);
            });
        </script>

    </div>
</div>

<a href="https://wa.me/201005319339" class="whatsapp-btn" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="30">
</a>

</body>
</html>
