    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #000000; }
        body { background-color: #fcfcfc; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        .luxury-hero { background: #000; padding: 120px 0; text-align: center; border-bottom: 1px solid rgba(197, 160, 89, 0.3); }
        .brand-name { font-family: 'Playfair Display', serif; font-size: calc(2.5rem + 4vw); color: #fff; animation: elegantReveal 1.8s forwards; }
        .gold-word { color: var(--gold); font-style: italic; }
        .subtitle { font-family: 'Montserrat', sans-serif; color: rgba(255,255,255,0.6); letter-spacing: 5px; text-transform: uppercase; font-size: 0.8rem; margin-top: 20px; }
        .card { border: none; border-radius: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.5s; height: 100%; background: #fff; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        .img-container { width: 100%; height: 250px; overflow: hidden; background: #f0f0f0; }
        .card-img-top { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .card:hover .card-img-top { transform: scale(1.1); }
        .btn-gold { background: transparent; color: var(--dark); border: 1px solid var(--dark); padding: 10px 25px; font-size: 0.75rem; letter-spacing: 2px; font-weight: 600; text-decoration: none; }
        .btn-gold:hover { background: var(--dark); color: #fff; }
        @keyframes elegantReveal { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }
        .whatsapp-btn { position: fixed; bottom: 30px; right: 30px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
