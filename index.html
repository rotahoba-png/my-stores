<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Rh for Design | Luxury Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #000000; }
        body { background-color: #f8f8f8; font-family: 'Cairo', sans-serif; margin: 0; }
        
        /* البانر الفخم */
        .luxury-hero {
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            padding: 100px 0;
            text-align: center;
            border-bottom: 4px solid var(--gold);
            position: relative;
        }

        /* الاسم 3D مع حركة */
        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 4.5rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
            animation: slideUp 1s ease-out;
            text-shadow: 0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 0 4px 0 #b9b9b9, 0 5px 0 #aaa, 0 10px 20px rgba(0,0,0,0.5);
        }

        .gold-word { color: var(--gold); }
        .subtitle { color: #888; letter-spacing: 2px; margin-top: 10px; animation: fadeIn 2s; }

        /* الكروت والظلال */
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: 0.4s ease;
            height: 100%;
            background: #fff;
            overflow: hidden;
        }
        .card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2); }
        .card-img-top { height: 200px; object-fit: cover; background: #222; }
        
        /* الأزرار الذهبية */
        .btn-gold {
            background: var(--dark);
            color: var(--gold);
            border: 1px solid var(--gold);
            border-radius: 30px;
            padding: 10px 25px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-gold:hover { background: var(--gold); color: #000; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .whatsapp-btn { position: fixed; bottom: 30px; right: 30px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    </style>
</head>
